                  <p style="margin:0;color:#71717a;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:21px">Se non hai effettuato questa modifica, contatta immediatamente l'amministratore di sistema.</p>
                </td>
              </tr>
              <tr><td class="footer-pad" align="center" style="padding:20px 36px 24px;border-top:1px solid #e4e4e7;color:#71717a;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:18px">ITECO SRL</td></tr>
