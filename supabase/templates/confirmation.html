<!doctype html>
<html lang="it" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="x-apple-disable-message-reformatting">
    <title>Conferma la tua registrazione</title>
    <!--[if mso]><noscript><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml></noscript><![endif]-->
    <style>
      /* biome-ignore-all lint/complexity/noImportantStyles: Email media queries must override inline styles in mail clients. */
            table, td { border-collapse: collapse; }
                  a { color: inherit; }
                  @media only screen and (max-width: 520px) {
                    .outer-pad { padding: 20px 12px !important; }
                    .content-pad { padding: 28px 24px 24px !important; }
                    .footer-pad { padding: 18px 24px 22px !important; }
                  }
    </style>
  </head>
  <body style="margin:0;padding:0;background-color:#f4f4f5;word-spacing:normal">
    <div role="article" aria-roledescription="email" lang="it" style="background-color:#f4f4f5">
      <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%;background-color:#f4f4f5">
        <tr>
          <td class="outer-pad" align="center" style="padding:40px 20px">
            <!--[if mso]><table role="presentation" width="480" border="0" cellpadding="0" cellspacing="0"><tr><td><![endif]-->
            <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%;max-width:480px;background-color:#ffffff;border:1px solid #e4e4e7;border-radius:12px;font-family:Arial,Helvetica,sans-serif">
              <tr><td align="center" style="padding:28px 32px;background-color:#18181b;border-radius:11px 11px 0 0;color:#ffffff;font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:bold;letter-spacing:1px;line-height:28px">ITECO</td></tr>
              <tr>
                <td class="content-pad" style="padding:36px 36px 32px">
                  <h1 style="margin:0 0 12px;color:#18181b;font-family:Arial,Helvetica,sans-serif;font-size:21px;font-weight:bold;line-height:28px">Conferma la tua registrazione</h1>
                  <p style="margin:0 0 28px;color:#52525b;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:26px">Per completare la registrazione e attivare il tuo account, clicca il pulsante qui sotto.</p>
                  <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                    <tr>
                      <td align="left" style="padding:0 0 28px">
                        <!--[if mso]><v:roundrect href="{{ .ConfirmationURL }}" style="height:46px;v-text-anchor:middle;width:180px" arcsize="13%" strokecolor="#18181b" strokeweight="2px" fillcolor="#f4f4f5"><w:anchorlock xmlns:w="urn:schemas-microsoft-com:office:word"/><center style="color:#18181b;font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:bold">Conferma email</center></v:roundrect><![endif]-->
                        <!--[if !mso]><!--><a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:11px 30px;background-color:#f4f4f5;border:2px solid #18181b;border-radius:6px;color:#18181b;font-family:Arial,Helvetica,sans-serif;font-size:15px;font-weight:bold;line-height:20px;text-decoration:none">Conferma email</a><!--<![endif]-->
                      </td>
                    </tr>
                  </table>
                  <p style="margin:0;color:#71717a;font-family:Arial,Helvetica,sans-serif;font-size:13px;line-height:21px">Se non hai richiesto la registrazione, puoi ignorare questa email.</p>
                </td>
              </tr>
              <tr><td class="footer-pad" align="center" style="padding:20px 36px 24px;border-top:1px solid #e4e4e7;color:#71717a;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:18px">ITECO SRL</td></tr>
            </table>
            <!--[if mso]></td></tr></table><![endif]-->
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
