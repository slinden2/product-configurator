# Hosted Supabase project configuration as code.
# Apply it to the explicitly linked project with `npm run supabase:config:push`.
# Reference: https://supabase.com/docs/guides/local-development/cli/config
project_id = "iteco-product-configurator"

# Application tables, RLS, and seed data remain managed by Drizzle and db/seed.ts.
# This file does not define Supabase migrations or a local Supabase stack.

[api]
enabled = true
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
major_version = 17

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[auth]
enabled = true
site_url = "https://config.itecosrl.com"
# The production wildcard supports the password-reset route. Localhost is the
# Next.js development server using the hosted development Supabase project.
additional_redirect_urls = [
  "https://config.itecosrl.com/**",
  "http://localhost:3000/**",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
# Supabase accepts six characters; application validation requires at least eight.
minimum_password_length = 6
password_requirements = ""

[auth.rate_limit]
email_sent = 30
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
# Email/password is the only enabled sign-in provider. Application validation
# separately restricts self-service signup to @itecosrl.com addresses.
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

# Social OAuth, Web3, third-party Auth, and Supabase's OAuth server are disabled.
[auth.external.apple]
enabled = false
client_id = ""
secret = "env(SUPABASE_AUTH_EXTERNAL_APPLE_SECRET)"
redirect_uri = ""
url = ""
skip_nonce_check = false
email_optional = false

[auth.web3.solana]
enabled = false

[auth.third_party.firebase]
enabled = false

[auth.third_party.auth0]
enabled = false

[auth.third_party.aws_cognito]
enabled = false

[auth.third_party.clerk]
enabled = false

[auth.oauth_server]
enabled = false
authorization_url_path = "/oauth/consent"
allow_dynamic_registration = false
